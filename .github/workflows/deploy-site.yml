name: "🌐 Deploy Site"

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'gallery/**'
      - 'docs/**'
      - '.github/workflows/deploy-site.yml'
  # called from ci.yml after a release is published — releases created with
  # the workflow's GITHUB_TOKEN never fire the `release` trigger below, so
  # the pipeline chains the deploy explicitly to pick up the new version
  workflow_call:
  # covers releases published by hand in the GitHub UI
  release:
    types: [published]
  # weekly safety net (note: GitHub disables cron on repos inactive for 60 days;
  # the workflow_call chain covers the case that matters)
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: "🏗️ Build Site"
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Check out repository"
        uses: actions/checkout@v5

      - name: "🚀 Build with Astro"
        uses: withastro/action@v6
        with:
          path: ./site
        env:
          # feeds the build-time GitHub releases fetch in src/lib/releases.ts
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: "🌍 Deploy to Pages"
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: "🌍 Publish to GitHub Pages"
        id: deployment
        uses: actions/deploy-pages@v5
