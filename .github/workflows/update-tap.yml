name: "🍺 Update Homebrew Tap"

on:
  workflow_call:
    inputs:
      release_tag:
        required: false
        type: string
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to submit. Defaults to the latest GitHub release.
        required: false
        type: string

jobs:
  update-tap:
    name: "🍺 Update Homebrew Tap"
    runs-on: ubuntu-latest

    steps:
      - name: "🏷️ Get release version"
        id: version
        run: |
          VERSION="${{ inputs.release_tag }}"

          if [ -z "${VERSION}" ]; then
            VERSION=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest | jq -r .tag_name)
          fi

          if [ -z "${VERSION}" ] || [ "${VERSION}" = "null" ]; then
            echo "Unable to determine release version" >&2
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Using version: ${VERSION}"

      - name: "🔐 Download checksums"
        run: |
          mkdir -p build
          VERSION=${{ steps.version.outputs.version }}

          for file in terminal-svg-darwin-amd64.sha256 terminal-svg-darwin-arm64.sha256 terminal-svg-linux-amd64.sha256 terminal-svg-linux-arm64.sha256; do
            for attempt in 1 2 3 4 5; do
              if curl -L --fail -o "build/${file}" "https://github.com/${{ github.repository }}/releases/download/${VERSION}/${file}"; then
                break
              fi

              if [ "${attempt}" -eq 5 ]; then
                echo "Failed to download ${file} after ${attempt} attempts" >&2
                exit 1
              fi

              echo "${file} not ready yet, retrying..."
              sleep 5
            done
          done

      - name: "📥 Clone homebrew-tap"
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: "🍻 Update formula"
        run: |
          VERSION=${{ steps.version.outputs.version }}
          DARWIN_AMD64_SHA=$(cut -d' ' -f1 build/terminal-svg-darwin-amd64.sha256)
          DARWIN_ARM64_SHA=$(cut -d' ' -f1 build/terminal-svg-darwin-arm64.sha256)
          LINUX_AMD64_SHA=$(cut -d' ' -f1 build/terminal-svg-linux-amd64.sha256)
          LINUX_ARM64_SHA=$(cut -d' ' -f1 build/terminal-svg-linux-arm64.sha256)

          cd homebrew-tap
          mkdir -p Formula

          cat > Formula/terminal-svg.rb << EOF
          class TerminalSvg < Formula
            desc "Pixel-perfect SVG screenshots of terminal output with window chrome"
            homepage "https://github.com/${{ github.repository }}"
            version "${VERSION#v}"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/${{ github.repository }}/releases/download/${VERSION}/terminal-svg-darwin-arm64"
                sha256 "${DARWIN_ARM64_SHA}"
              else
                url "https://github.com/${{ github.repository }}/releases/download/${VERSION}/terminal-svg-darwin-amd64"
                sha256 "${DARWIN_AMD64_SHA}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/${{ github.repository }}/releases/download/${VERSION}/terminal-svg-linux-arm64"
                sha256 "${LINUX_ARM64_SHA}"
              else
                url "https://github.com/${{ github.repository }}/releases/download/${VERSION}/terminal-svg-linux-amd64"
                sha256 "${LINUX_AMD64_SHA}"
              end
            end

            def install
              on_macos do
                if Hardware::CPU.arm?
                  bin.install "terminal-svg-darwin-arm64" => "terminal-svg"
                else
                  bin.install "terminal-svg-darwin-amd64" => "terminal-svg"
                end
              end

              on_linux do
                if Hardware::CPU.arm?
                  bin.install "terminal-svg-linux-arm64" => "terminal-svg"
                else
                  bin.install "terminal-svg-linux-amd64" => "terminal-svg"
                end
              end
            end

            test do
              assert_match "terminal-svg", shell_output("#{bin}/terminal-svg --version")
            end
          end
          EOF

          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add -A -- Formula

          if git diff --cached --quiet; then
            echo "Formula already up to date"
            exit 0
          fi

          git commit -m "Update terminal-svg to ${VERSION}"
          git push
