name: "🧪 CI"

on:
  push:
    branches: [main]
    tags:
      - 'v*'
    paths-ignore:
      - 'docs/**'
      - 'AGENTS.md'
      - 'README.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'AGENTS.md'
      - 'README.md'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: "✅ Check (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # macos-15 pinned while macos-latest migrates to macOS 26
        # (actions/runner-images#14167, June 15 - July 15 2026); revisit
        # once the macOS 26 image settles.
        os: [ubuntu-latest, macos-15, windows-latest]

    steps:
      - name: "📥 Check out repository"
        uses: actions/checkout@v6

      - name: "🦀 Install Rust toolchain"
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: "⚡ Restore Rust cache"
        uses: Swatinem/rust-cache@v2

      - name: "🎨 Check formatting"
        run: cargo fmt --check

      - name: "🔎 Check compilation"
        run: cargo check

      - name: "📎 Lint"
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: "🧪 Test"
        run: cargo test

  release-version:
    name: "🏷️ Release Version"
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Check out repository"
        uses: actions/checkout@v6

      - name: "🏷️ Validate release metadata"
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)

          echo "Tag version: ${TAG_VERSION}"
          echo "Cargo version: ${CARGO_VERSION}"

          if [ "${CARGO_VERSION}" != "${TAG_VERSION}" ]; then
            echo "Cargo.toml version must match ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      # Release notes are written BEFORE tagging (docs/releases/vX.Y.Z.md,
      # first line = release title). Failing fast here — before the five
      # platform builds — keeps the chained site deploy honest: the site
      # bakes release notes in at build time, so notes edited after the
      # fact used to mean a manual redeploy.
      - name: "📝 Validate release notes"
        run: |
          NOTES="docs/releases/${GITHUB_REF_NAME}.md"
          if [ ! -f "${NOTES}" ]; then
            echo "Missing ${NOTES} — write the release notes first" >&2
            echo "(first line is the release title: # ${GITHUB_REF_NAME} — <hook>)" >&2
            exit 1
          fi
          if ! head -n 1 "${NOTES}" | grep -q "^# ${GITHUB_REF_NAME} "; then
            echo "First line of ${NOTES} must be the title: # ${GITHUB_REF_NAME} — <hook>" >&2
            exit 1
          fi

  build:
    name: "📦 Build (${{ matrix.artifact }})"
    needs: [check, release-version]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: terminal-svg-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            artifact: terminal-svg-linux-arm64
          # macos-15 pinned for reproducible release builds during the
          # macos-latest -> macOS 26 migration (actions/runner-images#14167)
          - target: x86_64-apple-darwin
            os: macos-15
            artifact: terminal-svg-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-15
            artifact: terminal-svg-darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: terminal-svg-windows-amd64.exe

    steps:
      - name: "📥 Check out repository"
        uses: actions/checkout@v6

      - name: "🦀 Install Rust toolchain"
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: "⚡ Restore Rust cache"
        uses: Swatinem/rust-cache@v2

      - name: "🏗️ Build release binary"
        run: cargo build --release --target ${{ matrix.target }}

      - name: "🏷️ Rename binary (Unix)"
        if: matrix.os != 'windows-latest'
        run: cp target/${{ matrix.target }}/release/terminal-svg ${{ matrix.artifact }}

      - name: "🏷️ Rename binary (Windows)"
        if: matrix.os == 'windows-latest'
        run: cp target/${{ matrix.target }}/release/terminal-svg.exe ${{ matrix.artifact }}

      - name: "🔐 Generate checksum (Unix)"
        if: matrix.os != 'windows-latest'
        run: shasum -a 256 ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256

      - name: "🔐 Generate checksum (Windows)"
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 ${{ matrix.artifact }}).Hash.ToLower()
          "$hash  ${{ matrix.artifact }}" | Out-File -Encoding ascii ${{ matrix.artifact }}.sha256

      - name: "⬆️ Upload artifact"
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

  release:
    name: "🚀 Release"
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Check out repository"
        uses: actions/checkout@v6

      - name: "📦 Download all artifacts"
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: "🗂️ Collect release files"
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release/

      # The committed notes become the release at creation time, so the
      # chained site deploy publishes the real notes on the first pass.
      - name: "📝 Load release notes"
        id: notes
        run: |
          NOTES="docs/releases/${GITHUB_REF_NAME}.md"
          echo "title=$(sed -n '1s/^# *//p' "${NOTES}")" >> "${GITHUB_OUTPUT}"
          tail -n +2 "${NOTES}" | sed '1{/^$/d;}' > "${RUNNER_TEMP}/release-body.md"
          echo "body-path=${RUNNER_TEMP}/release-body.md" >> "${GITHUB_OUTPUT}"

      - name: "🚀 Create GitHub Release"
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ steps.notes.outputs.title }}
          body_path: ${{ steps.notes.outputs.body-path }}
          files: release/*
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          overwrite_files: true

  update-tap:
    name: "🍺 Update Homebrew Tap"
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/update-tap.yml
    with:
      release_tag: ${{ github.ref_name }}
    secrets: inherit

  # Redeploy the site once the release exists: the site build fetches
  # releases from the GitHub API, and a release created with GITHUB_TOKEN
  # never fires deploy-site's own `release` trigger.
  deploy-site:
    name: "🌐 Deploy Site"
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/deploy-site.yml
    secrets: inherit
