<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>terminal-svg editor</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23191a21'/%3E%3Ctext x='14' y='44' font-family='monospace' font-size='30' font-weight='bold' fill='%2350fa7b'%3E%E2%9D%AF%3C/text%3E%3Crect x='36' y='18' width='13' height='30' fill='%23f8f8f2'%3E%3Canimate attributeName='opacity' values='1;1;0;0' keyTimes='0;0.5;0.5;1' dur='1.2s' repeatCount='indefinite'/%3E%3C/rect%3E%3C/svg%3E">
<style>
  :root {
    --bg: #16171d;
    --panel: #1e1f28;
    --panel-edge: #2b2d3a;
    --bar: #131419;
    --ink: #d8dae5;
    --ink-dim: #8a8ea3;
    --accent: #50fa7b;
    --accent-dim: #2d8c48;
    --danger: #ff5555;
    --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --sidebar-w: 300px;
    --panel-h: 240px;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font: 13px/1.5 var(--mono);
    display: grid;
    grid-template-rows: auto minmax(0, 1fr) auto;
  }

  /* ---- title bar ---- */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 14px;
    background: var(--panel);
    border-bottom: 1px solid var(--panel-edge);
  }
  .mark { color: var(--accent); font-weight: 700; }
  .mark::after { content: "█"; color: var(--ink); animation: blink 1.2s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  header h1 { font-size: 13px; font-weight: 500; margin: 0; white-space: nowrap; }
  #file-name {
    color: var(--ink-dim);
    padding: 2px 8px;
    border: 1px solid var(--panel-edge);
    border-radius: 5px;
    max-width: 32ch;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #file-name.dirty::after { content: " ●"; color: var(--accent); }
  header .spacer, #panel-tabs .spacer { flex: 1; }
  button {
    font: inherit;
    color: var(--ink);
    background: transparent;
    border: 1px solid var(--panel-edge);
    border-radius: 6px;
    padding: 5px 14px;
    cursor: pointer;
  }
  button:hover { border-color: var(--ink-dim); }
  button.primary { color: #04140a; background: var(--accent); border-color: var(--accent); font-weight: 700; }
  button.primary:hover { background: #6cfa90; }
  button:disabled { opacity: 0.4; cursor: default; }

  /* ---- shell: activity bar | sidebar | handle | stage ---- */
  #shell {
    display: grid;
    grid-template-columns: 44px var(--sidebar-w) 4px minmax(0, 1fr);
    min-height: 0;
  }
  body.no-sidebar #shell { grid-template-columns: 44px 0 0 minmax(0, 1fr); }
  body.no-sidebar #sidebar, body.no-sidebar #sidebar-handle { display: none; }

  #activity {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    background: var(--bar);
    border-right: 1px solid var(--panel-edge);
    padding-top: 4px;
  }
  .act {
    position: relative;
    border: 0;
    border-radius: 0;
    padding: 11px 0;
    color: var(--ink-dim);
    background: transparent;
  }
  .act:hover { color: var(--ink); border: 0; }
  .act.active { color: var(--ink); }
  .act.active::before {
    content: "";
    position: absolute;
    left: 0; top: 8px; bottom: 8px;
    width: 2px;
    background: var(--accent);
  }
  .act svg { width: 20px; height: 20px; display: block; margin: 0 auto; }

  #sidebar {
    min-height: 0;
    overflow-y: auto;
    background: var(--panel);
    padding: 4px 16px 24px;
  }
  #sidebar-handle, #panel-handle { background: transparent; }
  #sidebar-handle { cursor: col-resize; }
  #panel-handle { cursor: row-resize; height: 4px; margin-top: -4px; position: relative; z-index: 2; }
  #sidebar-handle:hover, #sidebar-handle.dragging,
  #panel-handle:hover, #panel-handle.dragging { background: var(--accent-dim); }

  fieldset { border: 0; margin: 0; padding: 14px 0 2px; }
  fieldset + fieldset { border-top: 1px solid var(--panel-edge); }
  legend { padding: 0; color: var(--ink-dim); text-transform: lowercase; letter-spacing: 0.08em; font-size: 11px; }
  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin: 8px 0;
  }
  .row > label:first-child { color: var(--ink); flex: none; }
  input[type="text"], input[type="number"], select {
    font: inherit;
    color: var(--ink);
    background: var(--bg);
    border: 1px solid var(--panel-edge);
    border-radius: 5px;
    padding: 4px 7px;
    width: 130px;
  }
  input[type="number"] { width: 76px; }
  input:focus, select:focus { outline: none; border-color: var(--accent-dim); }
  input[type="checkbox"] { accent-color: var(--accent); }
  .check { justify-content: flex-start; gap: 8px; }
  .hidden { display: none !important; }
  fieldset.off { opacity: 0.35; pointer-events: none; }

  /* ---- stage: preview above the collapsible bottom panel ---- */
  #stage {
    display: flex;
    flex-direction: column;
    min-width: 0;
    min-height: 0;
  }
  #stage-toolbar {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 4px;
    padding: 3px 10px;
    background: var(--panel);
    border-bottom: 1px solid var(--panel-edge);
    color: var(--ink-dim);
    font-size: 11px;
  }
  .zbtn {
    padding: 1px 8px;
    border-radius: 4px;
    font-size: 11px;
    color: var(--ink-dim);
  }
  .zbtn.active { color: var(--accent); border-color: var(--accent-dim); }
  #zoom-label { min-width: 5ch; text-align: right; }
  #preview {
    flex: 1;
    min-height: 0;
    display: grid;
    overflow: auto;
    padding: 28px;
    background-image: radial-gradient(var(--panel-edge) 1px, transparent 1px);
    background-size: 22px 22px;
    cursor: grab;
  }
  #preview.panning { cursor: grabbing; }
  /* margin:auto centers like place-items but keeps oversized content
     reachable by scrolling (centered grid items clip their overflow). */
  #preview img { max-width: 100%; height: auto; margin: auto; }
  #preview.zoomed img { max-width: none; }
  #empty { text-align: center; color: var(--ink-dim); margin: auto; }
  #empty .big { font-size: 15px; color: var(--ink); margin-bottom: 8px; }
  #empty code { color: var(--accent); }

  #panel {
    display: none;
    flex-direction: column;
    height: var(--panel-h);
    min-height: 0;
    background: var(--panel);
    border-top: 1px solid var(--panel-edge);
  }
  body.show-panel #panel { display: flex; }
  #panel-tabs {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 4px 12px;
    border-bottom: 1px solid var(--panel-edge);
    color: var(--ink-dim);
    font-size: 11px;
  }
  #panel-tabs .tab {
    color: var(--ink);
    text-transform: lowercase;
    letter-spacing: 0.08em;
    border-bottom: 1px solid var(--accent);
    padding: 2px 0;
  }
  #panel-tabs .pbtn {
    padding: 1px 8px;
    border-radius: 4px;
    font-size: 11px;
    color: var(--ink-dim);
  }
  #panel-tabs .pbtn:hover:not(:disabled) { color: var(--ink); }
  #panel-tabs .rec { color: var(--ink-dim); }
  #panel-tabs input { width: 58px; padding: 1px 6px; font-size: 11px; }
  #panel-tabs input[type="text"] { width: 120px; }

  #panel-body {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
  }
  #panel-empty { display: grid; place-items: center; flex: 1; color: var(--ink-dim); }

  #ev-head, .ev-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 12px;
    font-size: 11px;
    height: 22px;
    white-space: nowrap;
  }
  #ev-head { color: var(--ink-dim); border-bottom: 1px solid var(--panel-edge); flex: none; }
  #ev-scroll { flex: 1; min-height: 0; overflow-y: auto; position: relative; }
  #ev-spacer { width: 1px; }
  .ev-row { position: absolute; left: 0; right: 0; cursor: pointer; }
  .ev-row:hover { background: rgba(80, 250, 123, 0.05); }
  .ev-row.sel { background: rgba(80, 250, 123, 0.1); box-shadow: inset 2px 0 var(--accent); }
  .ev-row.dim .ev-data, .ev-row.dim .ev-code { color: var(--ink-dim); }
  .ev-idx { width: 4ch; color: var(--ink-dim); text-align: right; flex: none; }
  .ev-time { width: 8ch; flex: none; }
  .ev-delta { width: 7ch; color: var(--ink-dim); flex: none; }
  .ev-code { width: 4ch; flex: none; }
  .ev-code.code-r { color: var(--accent); }
  .ev-data { flex: 1; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
  .ev-data .ctl { color: var(--accent-dim); }
  .ev-acts { display: none; gap: 2px; flex: none; }
  .ev-row:hover .ev-acts, .ev-row.sel .ev-acts { display: flex; }
  .ev-acts button {
    padding: 0 5px;
    border: 0;
    border-radius: 3px;
    font-size: 11px;
    color: var(--ink-dim);
    line-height: 20px;
  }
  .ev-acts button:hover { color: var(--ink); background: var(--panel-edge); border: 0; }

  #ev-edit {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 6px 12px;
    border-top: 1px solid var(--panel-edge);
    flex: none;
    font-size: 11px;
  }
  #ev-edit input, #ev-edit select { font-size: 11px; padding: 3px 6px; }
  #ev-edit input { width: 76px; }
  #ev-edit textarea {
    flex: 1;
    font: 11px/1.5 var(--mono);
    color: var(--ink);
    background: var(--bg);
    border: 1px solid var(--panel-edge);
    border-radius: 5px;
    padding: 4px 7px;
    resize: vertical;
  }
  #ev-edit textarea:focus { outline: none; border-color: var(--accent-dim); }
  #ev-err { color: var(--danger); max-width: 24ch; white-space: normal; }

  /* ---- status bar ---- */
  footer {
    display: flex;
    gap: 0;
    padding: 3px 12px;
    background: var(--panel);
    border-top: 1px solid var(--panel-edge);
    color: var(--ink-dim);
    font-size: 11px;
    align-items: center;
    min-height: 24px;
  }
  footer span:not(:empty) { padding: 0 9px; border-right: 1px solid var(--panel-edge); }
  footer span:not(:empty):last-of-type { border-right: 0; }
  footer #status { padding-left: 0; }
  footer .err { color: var(--danger); }
  footer .ok { color: var(--accent); }
  footer .spacer { flex: 1; border: 0 !important; }

  #drop-veil {
    position: fixed;
    inset: 0;
    display: none;
    place-items: center;
    background: rgba(22, 23, 29, 0.88);
    border: 2px dashed var(--accent);
    color: var(--accent);
    font-size: 16px;
    z-index: 10;
    pointer-events: none;
  }
  body.dragging #drop-veil { display: grid; }
</style>
</head>
<body>

<header>
  <span class="mark">❯</span>
  <h1>terminal-svg editor</h1>
  <span id="file-name">no file</span>
  <span class="spacer"></span>
  <button id="download" disabled>Download</button>
  <button id="save" class="primary" disabled>Save</button>
</header>

<div id="shell">
  <nav id="activity">
    <button id="act-style" class="act active" title="style controls">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round">
        <path d="M4 8h10M18 8h2M4 16h2M10 16h10"/>
        <circle cx="15.5" cy="8" r="2.2"/><circle cx="7.5" cy="16" r="2.2"/>
      </svg>
    </button>
    <button id="act-timeline" class="act" title="timeline (cast events)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round">
        <path d="M4 6h16M4 12h9M4 18h13"/>
        <circle cx="18" cy="17" r="3.2"/><path d="M18 15.6v1.6l1.1 0.8"/>
      </svg>
    </button>
  </nav>

  <aside id="sidebar">
    <div id="controls">
      <fieldset>
        <legend>output &amp; themes</legend>
        <div class="row"><label for="theme">theme</label><select id="theme"></select></div>
        <div class="row check"><input type="checkbox" id="dual"><label for="dual">dual light/dark</label></div>
        <div class="row dual-only hidden"><label for="theme-light">light</label><select id="theme-light"></select></div>
        <div class="row dual-only hidden"><label for="theme-dark">dark</label><select id="theme-dark"></select></div>
      </fieldset>

      <fieldset>
        <legend>window</legend>
        <div class="row"><label for="chrome">chrome</label>
          <select id="chrome">
            <option value="macos">macos</option>
            <option value="windows">windows</option>
            <option value="ubuntu">ubuntu</option>
            <option value="none">none</option>
          </select>
        </div>
        <div class="row"><label for="title">title</label><input type="text" id="title" placeholder="auto"></div>
        <div class="row"><label for="title-emoji">title emoji</label><input type="text" id="title-emoji" placeholder="auto 📁"></div>
        <div class="row check"><input type="checkbox" id="no-background"><label for="no-background">transparent background</label></div>
        <div class="row check"><input type="checkbox" id="no-shadow"><label for="no-shadow">no shadow</label></div>
      </fieldset>

      <fieldset>
        <legend>layout &amp; fonts</legend>
        <div class="row"><label for="font-size">font size</label><input type="number" id="font-size" value="14" min="6" max="72" step="1"></div>
        <div class="row"><label for="line-height">line height</label><input type="number" id="line-height" value="1.2" min="0.8" max="3" step="0.05"></div>
        <div class="row"><label for="padding">padding</label><input type="number" id="padding" value="10" min="0" step="1"></div>
        <div class="row"><label for="margin">margin</label><input type="number" id="margin" placeholder="auto" min="0" step="1"></div>
        <div class="row"><label for="cols">columns</label><input type="number" id="cols" min="10" max="500" step="1" placeholder="80"></div>
        <div class="row"><label for="rows">rows</label><input type="number" id="rows" min="2" max="200" step="1" placeholder="24"></div>
        <div class="row check"><input type="checkbox" id="no-font-embed"><label for="no-font-embed">system fonts only</label></div>
        <div class="row"><label for="font-family">font family</label><input type="text" id="font-family" placeholder="with system fonts" disabled></div>
      </fieldset>

      <fieldset id="anim-controls">
        <legend>animation</legend>
        <div class="row"><label for="cursor">cursor</label>
          <select id="cursor">
            <option value="block">block</option>
            <option value="bar">bar</option>
            <option value="underline">underline</option>
            <option value="none">none</option>
          </select>
        </div>
        <div class="row"><label for="speed">speed ×</label><input type="number" id="speed" value="1" min="0.1" step="0.25"></div>
        <div class="row"><label for="idle-time-limit">idle cap s</label><input type="number" id="idle-time-limit" placeholder="auto" min="0" step="0.5"></div>
        <div class="row"><label for="from">from s</label><input type="number" id="from" placeholder="start" min="0" step="0.5"></div>
        <div class="row"><label for="to">to s</label><input type="number" id="to" placeholder="end" min="0" step="0.5"></div>
        <div class="row check"><input type="checkbox" id="no-loop"><label for="no-loop">play once</label></div>
        <div class="row check"><input type="checkbox" id="static"><label for="static">static (final frame)</label></div>
        <div class="row"><label for="at">at s</label><input type="number" id="at" placeholder="end" min="0" step="0.5"></div>
      </fieldset>
    </div>
  </aside>
  <div id="sidebar-handle"></div>

  <section id="stage">
    <div id="stage-toolbar">
      <button id="zoom-fit" class="zbtn active" title="fit to window (⌘0)">fit</button>
      <button id="zoom-100" class="zbtn" title="actual size (⌘1)">100%</button>
      <button id="zoom-out" class="zbtn" title="zoom out (⌘−)">−</button>
      <button id="zoom-in" class="zbtn" title="zoom in (⌘+)">+</button>
      <span id="zoom-label"></span>
    </div>
    <div id="preview">
      <div id="empty">
        <div class="big">drop a .cast, .ansi, or terminal-svg .svg here</div>
        <div>or launch with a file: <code>terminal-svg editor demo.cast</code></div>
      </div>
      <img id="svg-view" class="hidden" alt="rendered terminal">
    </div>
    <div id="panel-handle"></div>
    <section id="panel">
      <div id="panel-tabs">
        <span class="tab">timeline</span>
        <span id="panel-meta"></span>
        <button id="ev-add" class="pbtn" title="insert an output event after the selection">+ event</button>
        <button id="ev-undo" class="pbtn" title="undo (⌘Z)" disabled>undo</button>
        <button id="ev-redo" class="pbtn" title="redo (⇧⌘Z)" disabled>redo</button>
        <button id="ev-live" class="pbtn hidden" title="leave the scrubbed frame, play the animation">▶ live</button>
        <span class="spacer"></span>
        <label class="rec" for="rec-title">recording</label>
        <input id="rec-title" type="text" placeholder="title">
        <input id="rec-cols" type="number" min="10" max="500" step="1" title="recording width — rewrites the header">
        <span class="rec">×</span>
        <input id="rec-rows" type="number" min="2" max="200" step="1" title="recording height — rewrites the header">
      </div>
      <div id="panel-body">
        <div id="panel-empty">the timeline needs a .cast</div>
        <div id="ev-head" class="hidden">
          <span class="ev-idx">#</span><span class="ev-time">time</span><span class="ev-delta">Δ</span><span class="ev-code">code</span><span class="ev-data">data</span>
        </div>
        <div id="ev-scroll" class="hidden"><div id="ev-spacer"></div></div>
        <div id="ev-edit" class="hidden">
          <span id="ev-edit-idx" class="rec"></span>
          <label class="rec" for="ev-time-in">t</label>
          <input id="ev-time-in" type="number" min="0" step="0.05">
          <select id="ev-code-in">
            <option value="o">o out</option>
            <option value="i">i in</option>
            <option value="m">m mark</option>
            <option value="r">r resize</option>
            <option value="x">x exit</option>
          </select>
          <textarea id="ev-data-in" rows="2" spellcheck="false" placeholder='text — escapes: \e \r \n \t \\ \xNN (resize: COLSxROWS)'></textarea>
          <span id="ev-err"></span>
        </div>
      </div>
    </section>
  </section>
</div>

<footer>
  <span id="status">ready</span>
  <span id="grid-size"></span>
  <span id="ev-count"></span>
  <span id="duration"></span>
  <span class="spacer"></span>
  <span id="dims"></span>
  <span id="size"></span>
  <span id="took"></span>
</footer>

<div id="drop-veil">drop to open</div>

<script>
"use strict";

const $ = (id) => document.getElementById(id);
const state = { loaded: false, kind: null, name: null, output: null, cast: null };
let renderSeq = 0;
let blobUrl = null;

// ---- options <-> controls -------------------------------------------------

function num(id) {
  const v = $(id).value.trim();
  return v === "" ? null : Number(v);
}

function gatherOptions() {
  const o = {};
  if ($("dual").checked) {
    o["theme-light"] = $("theme-light").value;
    o["theme-dark"] = $("theme-dark").value;
  } else {
    o.theme = $("theme").value;
  }
  o.chrome = $("chrome").value;
  if ($("no-background").checked) o["no-background"] = true;
  if ($("no-shadow").checked) o["no-shadow"] = true;
  if ($("title").value) o.title = $("title").value;
  if ($("title-emoji").value) o["title-emoji"] = $("title-emoji").value;
  for (const key of ["font-size", "line-height", "padding", "margin", "cols", "rows"]) {
    const v = num(key);
    if (v !== null) o[key] = v;
  }
  if ($("no-font-embed").checked) {
    o["no-font-embed"] = true;
    if ($("font-family").value) o["font-family"] = $("font-family").value;
  }
  if (state.kind === "cast") {
    o.cursor = $("cursor").value;
    const speed = num("speed");
    if (speed !== null) o.speed = speed;
    for (const key of ["idle-time-limit", "from", "to", "at"]) {
      const v = num(key);
      if (v !== null) o[key] = v;
    }
    if ($("no-loop").checked) o["no-loop"] = true;
    if ($("static").checked) o.static = true;
  }
  return o;
}

function applyOptions(o) {
  const set = (id, v) => { $(id).value = v ?? ""; };
  if (o["theme-light"] && o["theme-dark"]) {
    $("dual").checked = true;
    $("theme-light").value = o["theme-light"];
    $("theme-dark").value = o["theme-dark"];
  } else {
    $("dual").checked = false;
    if (o.theme) $("theme").value = o.theme;
  }
  $("chrome").value = o["no-window"] ? "none" : (o.chrome ?? "macos");
  $("no-background").checked = !!o["no-background"];
  $("no-shadow").checked = !!o["no-shadow"];
  set("title", o.title);
  set("title-emoji", o["title-emoji"]);
  set("font-size", o["font-size"] ?? 14);
  set("line-height", o["line-height"] ?? 1.2);
  set("padding", o.padding ?? 10);
  set("margin", o.margin);
  set("cols", o.cols);
  set("rows", o.rows);
  $("no-font-embed").checked = !!o["no-font-embed"];
  set("font-family", o["font-family"]);
  $("cursor").value = o.cursor ?? "block";
  set("speed", o.speed ?? 1);
  set("idle-time-limit", o["idle-time-limit"]);
  set("from", o.from);
  set("to", o.to);
  set("at", o.at);
  $("no-loop").checked = !!o["no-loop"];
  $("static").checked = !!o.static;
  syncEnabled();
}

function syncEnabled() {
  for (const el of document.querySelectorAll(".dual-only")) {
    el.classList.toggle("hidden", !$("dual").checked);
  }
  $("theme").parentElement.classList.toggle("hidden", $("dual").checked);
  $("font-family").disabled = !$("no-font-embed").checked;
  $("anim-controls").classList.toggle("off", state.kind !== "cast");
  // cols/rows: a PTY size for ANSI, a grid override for casts — the
  // recording's own size shows as the placeholder.
  const colsRows = [$("cols"), $("rows")];
  if (state.cast) {
    colsRows[0].placeholder = state.cast.cols;
    colsRows[1].placeholder = state.cast.rows;
    for (const el of colsRows) {
      el.title = `recording is ${state.cast.cols}×${state.cast.rows} — an override replays it at the new size`;
    }
  } else {
    colsRows[0].placeholder = "80";
    colsRows[1].placeholder = "24";
    for (const el of colsRows) el.title = "";
  }
  $("save").disabled = $("download").disabled = !state.loaded;
}

// ---- rendering ------------------------------------------------------------

function status(text, cls) {
  const el = $("status");
  el.textContent = text;
  el.className = cls || "";
}

async function api(path, payload) {
  const res = await fetch(path, {
    method: payload === undefined ? "GET" : "POST",
    body: payload === undefined ? undefined : JSON.stringify(payload),
  });
  const body = await res.json();
  if (!res.ok) throw new Error(body.error || res.statusText);
  return body;
}

async function render() {
  if (!state.loaded) return;
  const seq = ++renderSeq;
  const started = performance.now();
  status("rendering…");
  try {
    // Scrubbing pins the preview to a moment; it never reaches
    // Download/Save, which call gatherOptions() themselves.
    const options = gatherOptions();
    if (scrub.active) options.at = scrub.time;
    const { svg } = await api("/api/render", { options });
    if (seq !== renderSeq) return; // superseded while in flight
    const took = Math.round(performance.now() - started);
    if (blobUrl) URL.revokeObjectURL(blobUrl);
    blobUrl = URL.createObjectURL(new Blob([svg], { type: "image/svg+xml" }));
    const img = $("svg-view");
    img.src = blobUrl;
    img.classList.remove("hidden");
    $("empty").classList.add("hidden");
    const dims = svg.match(/viewBox="0 0 ([\d.]+) ([\d.]+)"/);
    $("dims").textContent = dims ? `${Math.round(dims[1])}×${Math.round(dims[2])}` : "";
    if (dims) zoom.natural = { w: Number(dims[1]), h: Number(dims[2]) };
    applyZoom();
    $("size").textContent = `${(svg.length / 1024).toFixed(1)} KB`;
    $("took").textContent = `${took} ms`;
    status("ready");
  } catch (e) {
    if (seq === renderSeq) status(e.message, "err");
  }
}

let debounceTimer;
function renderSoon() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(render, 150);
}

// ---- preview zoom ------------------------------------------------------------

/// "fit" scales down to the window (never up); an explicit level sizes
/// the image at natural × level. Survives re-renders.
const zoom = { mode: "fit", level: 1, natural: { w: 0, h: 0 } };

function applyZoom() {
  const img = $("svg-view");
  const fit = zoom.mode === "fit";
  $("preview").classList.toggle("zoomed", !fit);
  img.style.width = fit || !zoom.natural.w ? "" : `${zoom.natural.w * zoom.level}px`;
  $("zoom-label").textContent = fit ? "" : `${Math.round(zoom.level * 100)}%`;
  $("zoom-fit").classList.toggle("active", fit);
  $("zoom-100").classList.toggle("active", !fit && zoom.level === 1);
}

function setZoom(mode, level) {
  zoom.mode = mode;
  if (level !== undefined) zoom.level = Math.min(4, Math.max(0.25, level));
  applyZoom();
}

$("zoom-fit").addEventListener("click", () => setZoom("fit"));
$("zoom-100").addEventListener("click", () => setZoom("manual", 1));
$("zoom-in").addEventListener("click", () => setZoom("manual", zoom.level * 1.25));
$("zoom-out").addEventListener("click", () => setZoom("manual", zoom.level / 1.25));

document.addEventListener("keydown", (e) => {
  if (!(e.metaKey || e.ctrlKey)) return;
  const target = e.target;
  if (target.tagName === "INPUT" || target.tagName === "TEXTAREA" || target.tagName === "SELECT") return;
  if (e.key === "0") { e.preventDefault(); setZoom("fit"); }
  else if (e.key === "1") { e.preventDefault(); setZoom("manual", 1); }
  else if (e.key === "=" || e.key === "+") { e.preventDefault(); setZoom("manual", zoom.level * 1.25); }
  else if (e.key === "-") { e.preventDefault(); setZoom("manual", zoom.level / 1.25); }
});

$("preview").addEventListener("wheel", (e) => {
  if (!(e.metaKey || e.ctrlKey)) return;
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 1 / 1.1;
  const base = zoom.mode === "fit"
    ? $("svg-view").getBoundingClientRect().width / (zoom.natural.w || 1)
    : zoom.level;
  setZoom("manual", base * factor);
}, { passive: false });

// Grab-to-pan: drag anywhere on the dotted stage scrolls it.
$("preview").addEventListener("pointerdown", (e) => {
  if (e.button !== 0) return;
  const el = $("preview");
  const start = { x: e.clientX, y: e.clientY, left: el.scrollLeft, top: el.scrollTop };
  el.setPointerCapture(e.pointerId);
  el.classList.add("panning");
  const move = (ev) => {
    el.scrollLeft = start.left - (ev.clientX - start.x);
    el.scrollTop = start.top - (ev.clientY - start.y);
  };
  const up = () => {
    el.classList.remove("panning");
    el.removeEventListener("pointermove", move);
    el.removeEventListener("pointerup", up);
  };
  el.addEventListener("pointermove", move);
  el.addEventListener("pointerup", up);
});

// ---- open / save / download ------------------------------------------------

function setState(s) {
  state.loaded = s.loaded;
  state.kind = s.kind;
  state.name = s.name;
  state.output = s.output;
  state.cast = s.cast ?? null;
  $("file-name").textContent = s.name ?? "no file";
  const outName = s.output.split("/").pop();
  $("save").textContent = `Save → ${outName}`;
  $("save").title = s.output;
  $("grid-size").textContent = state.cast ? `${state.cast.cols}×${state.cast.rows}` : "";
  $("ev-count").textContent = state.cast ? `${state.cast.events} events` : "";
  $("duration").textContent = state.cast ? `${state.cast.duration.toFixed(1)}s` : "";
  $("panel-meta").textContent = state.cast ? `${state.cast.events} events` : "";
  if (s.loaded) applyOptions(s.options);
  syncEnabled();
}

async function openFile(file) {
  status(`opening ${file.name}…`);
  try {
    const bytes = new Uint8Array(await file.arrayBuffer());
    let binary = "";
    for (let i = 0; i < bytes.length; i += 0x8000) {
      binary += String.fromCharCode(...bytes.subarray(i, i + 0x8000));
    }
    const s = await api("/api/open", {
      name: file.name,
      data: btoa(binary),
      options: gatherOptions(),
    });
    setState(s);
    await loadTimeline();
    await render();
  } catch (e) {
    status(e.message, "err");
  }
}

$("download").addEventListener("click", async () => {
  try {
    const { svg } = await api("/api/render", { options: gatherOptions(), embed: true });
    const stem = (state.name ?? "terminal").replace(/\.[^.]+$/, "");
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([svg], { type: "image/svg+xml" }));
    a.download = `${stem}.svg`;
    a.click();
    URL.revokeObjectURL(a.href);
    status(`downloaded ${a.download}`, "ok");
  } catch (e) {
    status(e.message, "err");
  }
});

$("save").addEventListener("click", async () => {
  try {
    const { path } = await api("/api/save", { options: gatherOptions(), embed: true });
    status(`wrote ${path}`, "ok");
  } catch (e) {
    status(e.message, "err");
  }
});

// ---- shell: activity bar + resizable panels ---------------------------------

$("act-style").addEventListener("click", () => {
  const hidden = document.body.classList.toggle("no-sidebar");
  $("act-style").classList.toggle("active", !hidden);
});

$("act-timeline").addEventListener("click", () => {
  const shown = document.body.classList.toggle("show-panel");
  $("act-timeline").classList.toggle("active", shown);
});

/// Drag a divider: `apply` gets the pointer position and sets the CSS var.
function dragHandle(handle, apply) {
  handle.addEventListener("pointerdown", (e) => {
    e.preventDefault();
    handle.setPointerCapture(e.pointerId);
    handle.classList.add("dragging");
    const move = (ev) => apply(ev);
    const up = () => {
      handle.classList.remove("dragging");
      handle.removeEventListener("pointermove", move);
      handle.removeEventListener("pointerup", up);
    };
    handle.addEventListener("pointermove", move);
    handle.addEventListener("pointerup", up);
  });
}

dragHandle($("sidebar-handle"), (e) => {
  const w = Math.min(460, Math.max(220, e.clientX - 44));
  document.documentElement.style.setProperty("--sidebar-w", `${w}px`);
});

dragHandle($("panel-handle"), (e) => {
  const shell = $("shell").getBoundingClientRect();
  const h = Math.min(shell.height - 120, Math.max(120, shell.bottom - e.clientY));
  document.documentElement.style.setProperty("--panel-h", `${h}px`);
});

// ---- timeline ---------------------------------------------------------------

const ROW_H = 22;
const timeline = {
  events: [],      // [{time, code, data}] — absolute seconds, wire triples
  header: null,    // {cols, rows, title, "idle-time-limit"}
  selected: null,  // the selected event object (survives re-sorts)
  dirty: false,
  undo: [],
  redo: [],
  loaded: false,
  notified: false, // the one-time "first edit rewrites" note
};
const scrub = { active: false, time: 0 };

async function loadTimeline() {
  Object.assign(timeline, {
    events: [], header: null, selected: null, dirty: false,
    undo: [], redo: [], loaded: false, notified: false,
  });
  scrub.active = false;
  if (state.kind === "cast" && state.cast) {
    try {
      const { events } = await api("/api/events");
      timeline.events = events;
      timeline.header = {
        cols: state.cast.cols,
        rows: state.cast.rows,
        title: state.cast.title,
        "idle-time-limit": state.cast["idle-time-limit"],
      };
      timeline.loaded = true;
    } catch (e) {
      status(e.message, "err");
    }
  }
  // The panel follows the source: open for casts, shut otherwise.
  document.body.classList.toggle("show-panel", timeline.loaded);
  $("act-timeline").classList.toggle("active", timeline.loaded);
  renderTimeline();
}

function renderTimeline() {
  const on = timeline.loaded;
  $("panel-empty").classList.toggle("hidden", on);
  $("ev-head").classList.toggle("hidden", !on);
  $("ev-scroll").classList.toggle("hidden", !on);
  for (const id of ["rec-title", "rec-cols", "rec-rows", "ev-add"]) $(id).disabled = !on;
  $("file-name").classList.toggle("dirty", timeline.dirty);
  $("ev-undo").disabled = !timeline.undo.length;
  $("ev-redo").disabled = !timeline.redo.length;
  $("ev-live").classList.toggle("hidden", !scrub.active);
  if (!on) {
    $("ev-edit").classList.add("hidden");
    $("rec-title").value = $("rec-cols").value = $("rec-rows").value = "";
    $("panel-meta").textContent = "";
    return;
  }
  const dur = timeline.events.length ? timeline.events[timeline.events.length - 1].time : 0;
  $("panel-meta").textContent = `${timeline.events.length} events · ${dur.toFixed(1)}s`;
  $("rec-title").value = timeline.header.title ?? "";
  $("rec-cols").value = timeline.header.cols;
  $("rec-rows").value = timeline.header.rows;
  $("ev-spacer").style.height = `${timeline.events.length * ROW_H}px`;
  renderRows();
  renderEditStrip();
}

// Windowed rows: only what's visible (±20) exists in the DOM.
function renderRows() {
  const scroll = $("ev-scroll");
  for (const el of scroll.querySelectorAll(".ev-row")) el.remove();
  const first = Math.max(0, Math.floor(scroll.scrollTop / ROW_H) - 20);
  const last = Math.min(
    timeline.events.length,
    Math.ceil((scroll.scrollTop + scroll.clientHeight) / ROW_H) + 20,
  );
  const frag = document.createDocumentFragment();
  for (let i = first; i < last; i++) frag.append(buildRow(i));
  scroll.append(frag);
}

function ctrlPictures(s) {
  let out = "";
  for (const ch of s) {
    const c = ch.codePointAt(0);
    if (c === 0x7f) out += "␡";
    else if (c < 0x20) out += String.fromCodePoint(0x2400 + c);
    else out += ch;
  }
  return out;
}

function buildRow(i) {
  const e = timeline.events[i];
  const row = document.createElement("div");
  row.className = "ev-row";
  if (timeline.selected === e) row.classList.add("sel");
  if (e.code !== "o") row.classList.add("dim");
  row.style.top = `${i * ROW_H}px`;
  const cell = (cls, text) => {
    const s = document.createElement("span");
    s.className = cls;
    s.textContent = text;
    return s;
  };
  row.append(
    cell("ev-idx", i),
    cell("ev-time", e.time.toFixed(2)),
    cell("ev-delta", `+${(e.time - (i > 0 ? timeline.events[i - 1].time : 0)).toFixed(2)}`),
    cell(`ev-code code-${e.code}`, e.code),
    cell("ev-data", e.code === "r" ? `⇲ ${e.data}` : ctrlPictures(e.data)),
  );
  const acts = document.createElement("span");
  acts.className = "ev-acts";
  const act = (label, title, fn) => {
    const b = document.createElement("button");
    b.textContent = label;
    b.title = title;
    b.addEventListener("click", (ev) => { ev.stopPropagation(); fn(); });
    acts.append(b);
  };
  act("↑", "swap with the row above (same timestamp only)", () => swapEvent(e, -1));
  act("↓", "swap with the row below (same timestamp only)", () => swapEvent(e, 1));
  act("⧉", "duplicate", () => duplicateEvent(e));
  act("✕", "delete", () => deleteEvent(e));
  row.append(acts);
  row.addEventListener("click", () => selectEvent(timeline.selected === e ? null : e));
  return row;
}

$("ev-scroll").addEventListener("scroll", () => requestAnimationFrame(renderRows));

// ---- timeline: selection + scrub ----

function selectEvent(e) {
  timeline.selected = e;
  scrub.active = e !== null;
  if (e) scrub.time = e.time;
  renderTimeline();
  render();
}

$("ev-live").addEventListener("click", () => selectEvent(null));

// ---- timeline: mutations ----

/// Every user edit lands here: snapshot for undo (coalescing typing
/// bursts on the same field), mutate, re-sort, re-render, and push the
/// rewritten cast to the server. The first edit is the point of no
/// return for byte-exactness — say so once.
let lastUndoKey = null;
function mutate(undoKey, fn) {
  if (undoKey === null || undoKey !== lastUndoKey) {
    timeline.undo.push(snapshotTimeline());
    if (timeline.undo.length > 100) timeline.undo.shift();
    timeline.redo = [];
  }
  lastUndoKey = undoKey;
  fn();
  timeline.events.sort((a, b) => a.time - b.time); // stable: ties keep order
  if (!timeline.dirty) {
    timeline.dirty = true;
    if (!timeline.notified) {
      timeline.notified = true;
      status("editing rewrites the recording (times normalize; v3 comments drop)", "ok");
    }
  }
  renderTimeline();
  commitSoon();
}

function snapshotTimeline() {
  return {
    events: structuredClone(timeline.events),
    header: { ...timeline.header },
    selected: timeline.events.indexOf(timeline.selected),
  };
}

function restoreTimeline(snap) {
  timeline.events = snap.events;
  timeline.header = snap.header;
  timeline.selected = snap.selected >= 0 ? timeline.events[snap.selected] : null;
  scrub.active = timeline.selected !== null;
  if (timeline.selected) scrub.time = timeline.selected.time;
  timeline.dirty = true;
  renderTimeline();
  commitSoon();
  render();
}

function undoTimeline() {
  const snap = timeline.undo.pop();
  if (!snap) return;
  timeline.redo.push(snapshotTimeline());
  lastUndoKey = null;
  restoreTimeline(snap);
}

function redoTimeline() {
  const snap = timeline.redo.pop();
  if (!snap) return;
  timeline.undo.push(snapshotTimeline());
  lastUndoKey = null;
  restoreTimeline(snap);
}

$("ev-undo").addEventListener("click", undoTimeline);
$("ev-redo").addEventListener("click", redoTimeline);

document.addEventListener("keydown", (e) => {
  if (!(e.metaKey || e.ctrlKey) || e.key.toLowerCase() !== "z") return;
  if (!timeline.loaded || !document.body.classList.contains("show-panel")) return;
  const t = e.target;
  if (t.tagName === "INPUT" || t.tagName === "TEXTAREA") return; // native undo
  e.preventDefault();
  if (e.shiftKey) redoTimeline(); else undoTimeline();
});

function swapEvent(e, dir) {
  const i = timeline.events.indexOf(e);
  const j = i + dir;
  if (j < 0 || j >= timeline.events.length) return;
  if (timeline.events[j].time !== e.time) {
    status("different timestamps — edit the time to move it", "err");
    return;
  }
  mutate(null, () => {
    [timeline.events[i], timeline.events[j]] = [timeline.events[j], timeline.events[i]];
  });
}

function duplicateEvent(e) {
  const i = timeline.events.indexOf(e);
  mutate(null, () => timeline.events.splice(i + 1, 0, { ...e }));
}

function deleteEvent(e) {
  const i = timeline.events.indexOf(e);
  mutate(null, () => timeline.events.splice(i, 1));
  if (timeline.selected === e) selectEvent(null);
}

$("ev-add").addEventListener("click", () => {
  const i = timeline.selected
    ? timeline.events.indexOf(timeline.selected)
    : timeline.events.length - 1;
  const at = timeline.events[i]?.time ?? 0;
  const next = timeline.events[i + 1]?.time;
  const fresh = {
    time: Number((next !== undefined ? (at + next) / 2 : at + 0.5).toFixed(6)),
    code: "o",
    data: "",
  };
  mutate(null, () => timeline.events.splice(i + 1, 0, fresh));
  selectEvent(fresh);
  $("ev-data-in").focus();
});

// Recording header fields: the destructive resize (vs the sidebar's
// non-destructive render override).
$("rec-cols").addEventListener("input", () => {
  const v = num("rec-cols");
  if (v !== null && v >= 2) mutate("rec-cols", () => { timeline.header.cols = v; });
});
$("rec-rows").addEventListener("input", () => {
  const v = num("rec-rows");
  if (v !== null && v >= 2) mutate("rec-rows", () => { timeline.header.rows = v; });
});
$("rec-title").addEventListener("input", () => {
  mutate("rec-title", () => { timeline.header.title = $("rec-title").value || null; });
});

// ---- timeline: the edit strip ----

/// Escapes for the data cell: \e \r \n \t \\ \xNN. `unescapeEvent` is
/// the exact inverse of `escapeEvent` (backslash first), checked on
/// every save below.
function escapeEvent(s) {
  let out = "";
  for (const ch of s) {
    const c = ch.codePointAt(0);
    if (ch === "\\") out += "\\\\";
    else if (ch === "\x1b") out += "\\e";
    else if (ch === "\r") out += "\\r";
    else if (ch === "\n") out += "\\n";
    else if (ch === "\t") out += "\\t";
    else if (c < 0x20 || c === 0x7f) out += `\\x${c.toString(16).padStart(2, "0")}`;
    else out += ch;
  }
  return out;
}

function unescapeEvent(s) {
  let out = "";
  for (let i = 0; i < s.length; i++) {
    if (s[i] !== "\\") { out += s[i]; continue; }
    const n = s[++i];
    if (n === "\\") out += "\\";
    else if (n === "e") out += "\x1b";
    else if (n === "r") out += "\r";
    else if (n === "n") out += "\n";
    else if (n === "t") out += "\t";
    else if (n === "x") {
      const hex = s.slice(i + 1, i + 3);
      if (!/^[0-9a-fA-F]{2}$/.test(hex)) throw new Error(`bad \\x escape at ${i - 1}`);
      out += String.fromCharCode(parseInt(hex, 16));
      i += 2;
    } else throw new Error(`unknown escape \\${n ?? "<end>"}`);
  }
  return out;
}

function renderEditStrip() {
  const e = timeline.selected;
  $("ev-edit").classList.toggle("hidden", !e);
  $("ev-err").textContent = "";
  if (!e) return;
  $("ev-edit-idx").textContent = `#${timeline.events.indexOf(e)}`;
  $("ev-time-in").value = e.time;
  $("ev-code-in").value = e.code;
  if ($("ev-code-in").value !== e.code) {
    // An unknown code from a future format: keep it selectable.
    const opt = document.createElement("option");
    opt.value = opt.textContent = e.code;
    $("ev-code-in").append(opt);
    $("ev-code-in").value = e.code;
  }
  $("ev-data-in").value = escapeEvent(e.data);
}

$("ev-time-in").addEventListener("input", () => {
  const e = timeline.selected;
  const v = num("ev-time-in");
  if (!e || v === null || v < 0) return;
  mutate("ev-time", () => { e.time = v; });
  scrub.time = v;
  render();
});

$("ev-code-in").addEventListener("input", () => {
  const e = timeline.selected;
  if (!e) return;
  mutate(null, () => { e.code = $("ev-code-in").value; });
  render();
});

$("ev-data-in").addEventListener("input", () => {
  const e = timeline.selected;
  if (!e) return;
  let data;
  try {
    data = unescapeEvent($("ev-data-in").value);
  } catch (err) {
    $("ev-err").textContent = err.message;
    return;
  }
  // Round-trip self-check: what we store must escape back losslessly.
  if (unescapeEvent(escapeEvent(data)) !== data) {
    $("ev-err").textContent = "escape round-trip failed";
    return;
  }
  if (e.code === "r" && !/^\d+x\d+$/.test(data)) {
    $("ev-err").textContent = "resize data is COLSxROWS";
    return;
  }
  $("ev-err").textContent = "";
  mutate("ev-data", () => { e.data = data; });
  render();
});

// ---- timeline: pushing edits to the server ----

let commitTimer;
function commitSoon() {
  clearTimeout(commitTimer);
  commitTimer = setTimeout(commitTimeline, 300);
}

async function commitTimeline() {
  if (!timeline.loaded || !timeline.dirty) return;
  try {
    const s = await api("/api/events", {
      header: timeline.header,
      events: timeline.events,
    });
    state.cast = s.cast ?? state.cast;
    $("grid-size").textContent = state.cast ? `${state.cast.cols}×${state.cast.rows}` : "";
    $("ev-count").textContent = state.cast ? `${state.cast.events} events` : "";
    $("duration").textContent = state.cast ? `${state.cast.duration.toFixed(1)}s` : "";
    syncEnabled(); // cols/rows placeholders track the recording
    renderSoon();
  } catch (e) {
    status(e.message, "err");
  }
}

// ---- wiring ---------------------------------------------------------------

document.addEventListener("dragover", (e) => {
  e.preventDefault();
  document.body.classList.add("dragging");
});
document.addEventListener("dragleave", (e) => {
  if (!e.relatedTarget) document.body.classList.remove("dragging");
});
document.addEventListener("drop", (e) => {
  e.preventDefault();
  document.body.classList.remove("dragging");
  const file = e.dataTransfer.files[0];
  if (file) openFile(file);
});

$("controls").addEventListener("input", (e) => {
  if (e.target.id === "dual" || e.target.id === "no-font-embed") syncEnabled();
  renderSoon();
});

(async () => {
  try {
    const s = await api("/api/state");
    const options = [...s.themes]
      .map((t) => `<option value="${t}">${t}</option>`)
      .join("");
    for (const id of ["theme", "theme-light", "theme-dark"]) $(id).innerHTML = options;
    $("theme").value = "dracula";
    $("theme-light").value = s.themes.includes("github-light") ? "github-light" : s.themes[0];
    $("theme-dark").value = s.themes.includes("github-dark") ? "github-dark" : s.themes[0];
    setState(s);
    await loadTimeline();
    if (s.loaded) await render();
  } catch (e) {
    status(e.message, "err");
  }
})();
</script>
</body>
</html>
