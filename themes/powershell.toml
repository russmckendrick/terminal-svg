# Windows PowerShell (classic conhost): the trademark navy console with
# the Campbell palette. Pair with --chrome windows.
name = "powershell"

[colors]
foreground = "#eeedf0"
background = "#012456"
black = "#0c0c0c"
red = "#c50f1f"
green = "#13a10e"
yellow = "#c19c00"
blue = "#0037da"
magenta = "#881798"
cyan = "#3a96dd"
white = "#cccccc"
bright_black = "#767676"
bright_red = "#e74856"
bright_green = "#16c60c"
bright_yellow = "#f9f1a5"
bright_blue = "#3b78ff"
bright_magenta = "#b4009e"
bright_cyan = "#61d6d6"
bright_white = "#f2f2f2"

[chrome]
shadow_opacity = 0.3
